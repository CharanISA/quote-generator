<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mood Quote Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="landing-shell">
      <section class="hero" aria-labelledby="app-title">
        <div class="hero-copy">
          <h1 id="app-title">Choose your mood. Draw a quote from the path.</h1>
          <p class="lede">
            Original flashcard quotes inspired by cultivation, mystery, regression, survival,
            and martial world web novels.
          </p>

          <button type="button" class="primary-button" id="random-button">
            Generate random quote
          </button>
        </div>

        <div class="visual-stage" aria-hidden="true">
          <div class="moon"></div>
          <div class="mountain mountain-back"></div>
          <div class="mountain mountain-front"></div>
          <div class="sect-gate">
            <span></span>
            <span></span>
          </div>
        </div>

        <div class="mood-section">
          <p class="section-label">Select a mood</p>
          <div class="emoji-grid" aria-label="Choose a mood">
            <button type="button" class="mood-chip" data-mood="happy" aria-label="Happy mood">
              <span aria-hidden="true">&#128522;</span>
              Happy
            </button>
            <button type="button" class="mood-chip" data-mood="sad" aria-label="Sad mood">
              <span aria-hidden="true">&#128532;</span>
              Sad
            </button>
            <button type="button" class="mood-chip" data-mood="angry" aria-label="Angry mood">
              <span aria-hidden="true">&#128548;</span>
              Angry
            </button>
            <button type="button" class="mood-chip" data-mood="stressed" aria-label="Stressed mood">
              <span aria-hidden="true">&#128565;&#8205;&#128171;</span>
              Stressed
            </button>
            <button type="button" class="mood-chip" data-mood="tired" aria-label="Tired mood">
              <span aria-hidden="true">&#128564;</span>
              Tired
            </button>
            <button type="button" class="mood-chip" data-mood="hopeful" aria-label="Hopeful mood">
              <span aria-hidden="true">&#127780;&#65039;</span>
              Hopeful
            </button>
            <button type="button" class="mood-chip" data-mood="anxious" aria-label="Anxious mood">
              <span aria-hidden="true">&#128543;</span>
              Anxious
            </button>
            <button type="button" class="mood-chip" data-mood="confident" aria-label="Confident mood">
              <span aria-hidden="true">&#128526;</span>
              Confident
            </button>
          </div>
        </div>
      </section>
    </main>

    <section class="flashcard-overlay" id="flashcard-overlay" aria-hidden="true">
      <article class="flashcard" role="dialog" aria-modal="true" aria-labelledby="mood-label">
        <button type="button" class="close-button" id="close-button" aria-label="Close quote">x</button>
        <p class="mood-label" id="mood-label">Random quote</p>
        <blockquote id="quote-text">Your inspired quote will appear here.</blockquote>
        <p class="source-note" id="source-note">Inspired by web novel themes</p>
        <div class="quote-actions">
          <button type="button" class="secondary-button" id="another-button">Another</button>
          <button type="button" class="secondary-button" id="copy-button">Copy</button>
        </div>
      </article>
    </section>

    <script src="script.js"></script>
  </body>
</html>
